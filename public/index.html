<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentiMind - AI 감성 분석 서비스</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="#" class="logo">Senti<span>Mind</span></a>
        </div>
    </nav>

    <main class="hero">
        <div class="container">
            <h1 class="hero-title">당신의 문장 속에 담긴<br><span>감성</span>을 찾아보세요</h1>
            <p class="hero-subtitle">OpenAI 기반의 인공지능이 문장의 긍정, 부정, 중립 상태를 정확하게 분석해 드립니다.</p>
            
            <div class="search-container">
                <form id="analyze-form">
                    <div class="input-wrapper">
                        <input type="text" id="text-input" placeholder="분석하고 싶은 문장을 입력하세요 (2-500자)" autocomplete="off">
                        <button type="submit" id="submit-btn">분석하기</button>
                    </div>
                </form>
            </div>

            <div class="examples">
                <button class="example-btn">오늘 날씨가 정말 화창해서 기분이 최고예요!</button>
                <button class="example-btn">길을 가다 지갑을 잃어버려서 너무 속상해요.</button>
                <button class="example-btn">점심으로 비빔밥을 먹었습니다.</button>
            </div>

            <div id="loading" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>감성을 분석하는 중입니다...</p>
            </div>

            <div id="result-container" class="result-container hidden">
                <div class="result-card">
                    <div class="result-header">
                        <span id="sentiment-badge" class="badge">긍정</span>
                        <div class="confidence-wrapper">
                            <span class="label">신뢰도</span>
                            <span id="confidence-value" class="value">92%</span>
                        </div>
                    </div>
                    <div class="result-body">
                        <h3>분석 결과</h3>
                        <p id="reason-text">이 문장은 전반적으로 긍정적인 감정을 표현하고 있습니다.</p>
                    </div>
                </div>
            </div>

            <div id="error-message" class="error-message hidden">
                <p>오류가 발생했습니다. 다시 시도해 주세요.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 SentiMind. All rights reserved.</p>
        </div>
    </footer>

    <script src="/script.js"></script>
</body>
</html>
